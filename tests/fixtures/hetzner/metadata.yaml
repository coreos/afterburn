              ipv4: true
            - type: static
              address: 0a00:0a0:a000:a000::1/64
              ipv6: true
              gateway: aa11::1
              dns_nameservers:
                - 0a01:0ff:ff00::add:2
                - 0a01:0ff:ff00::add:1
